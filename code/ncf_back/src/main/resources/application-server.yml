spring:
  main:
    lazy-initialization: true
  jmx:
    enabled: false
  datasource:
    hikari:
      maximum-pool-size: 4
      minimum-idle: 1
      idle-timeout: 30000
      max-lifetime: 600000
      connection-timeout: 5000
  data:
    redis:
      lettuce:
        pool:
          max-active: 4
          max-idle: 2
          min-idle: 0

server:
  tomcat:
    threads:
      max: 40
      min-spare: 4

management:
  endpoints:
    enabled-by-default: false
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      enabled: true
    info:
      enabled: true

app:
  music:
    catalog:
      auto-sync-on-startup: false
    favorite-seed:
      enabled: false
  recommendation:
    refresh-on-startup: false

logging:
  level:
    com.example.ncfback: WARN
    org.mybatis: WARN
